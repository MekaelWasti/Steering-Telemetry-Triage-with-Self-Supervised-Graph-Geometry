<linearGradient id="gcheck" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4ade80"/><stop offset="1" stop-color="#15803d"/></linearGradient>
<linearGradient id="gribbon" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#d7e7ff"/><stop offset="1" stop-color="#ffe7c4"/></linearGradient>
<linearGradient id="gtitle" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3f6fd0"/><stop offset="1" stop-color="#46aee0"/></linearGradient>
</defs>
<style>
.bg{fill:#ffffff;stroke:#eceae4}
.card{fill:#fbf9f7;stroke:#e7e2da;stroke-width:1}
