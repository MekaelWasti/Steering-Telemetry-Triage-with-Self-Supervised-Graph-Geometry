<text class="ttl" x="296" y="234" font-size="13">Scoring &amp;<tspan x="296" dy="16">clustering</tspan></text>
<rect class="tagr" x="258" y="272" width="34" height="18" rx="9"/><text class="tagt" x="275" y="285" text-anchor="middle" font-size="11">kNN</text>
