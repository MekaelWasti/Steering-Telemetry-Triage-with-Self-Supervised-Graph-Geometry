<text x="340" y="33" text-anchor="middle" font-size="18" font-weight="500" fill="url(#gtitle)">Cyber telemetry triage — system architecture</text>
<text class="sub" x="340" y="51" text-anchor="middle" font-size="11">Self-supervised heterogeneous graph learning over endpoint telemetry</text>

